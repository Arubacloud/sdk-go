version: "2"

run:
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unparam
    - unconvert
    - goconst
  settings:
    errcheck:
      check-blank: true
  exclusions:
    paths:
      - pkg/generated
    rules:
      - linters:
          - errcheck
        text: httpResp.Body.Close
      - path: _test\.go
        linters:
          - errcheck
          - goconst

formatters:
  enable:
    - gofmt
    - goimports
